name: zarfinance
description: ZarFinance - Device Admin Application for mobile phone financing in Nigeria
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Location
  geolocator: ^11.0.0
  permission_handler: ^11.1.0
  
  # Background Tasks
  # workmanager: ^0.5.2  # Temporarily disabled due to compatibility issues
  flutter_background_service: ^5.0.5
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  
  # Device Admin (Android) - Note: You'll need to implement platform channels for device admin
  
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.2
  device_info_plus: ^9.1.1
  package_info_plus: ^5.0.1
  table_calendar: ^3.0.9
  local_auth: ^2.1.7
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

